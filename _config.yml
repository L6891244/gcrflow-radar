# GCRflow Radar - Blog Configuration
title: GCRflow Radar
tagline: Prepress Technology Insights
description: >-
  GCRflow Radar — practical prepress insights on GCR conversion,
  ink coverage optimization, and PDF print production workflows.

url: "https://radar.gcrflow.com"
baseurl: ""

# Author
author:
  name: GCRflow Team
  url: https://gcrflow.com

# Language
lang: en

# Build
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:title/
future: false
show_drafts: false

# Pagination
paginate: 8
paginate_path: "/page/:num/"

# Collections
collections:
  categories:
    output: true

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: false
      toc: true

# SEO
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Exclude
exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - node_modules
  - _drafts/README.md

