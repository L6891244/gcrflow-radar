# GCRflow Radar - Blog Configuration
title: GCRflow Radar
tagline: 印前技术洞察 · Prepress Insights
description: >-
  GCRflow Radar — 来自15年印前实战经验的技术洞察。
  聚焦GCR转换、总墨量优化、PDF印前处理，帮助印刷从业者解决真实问题。

url: "https://radar.gcrflow.com"
baseurl: ""

# Author
author:
  name: GCRflow Team
  url: https://gcrflow.com

# Language
lang: zh-CN

# Build
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:title/
future: true
show_drafts: true

# Pagination
paginate: 8
paginate_path: "/page/:num/"

# Collections
collections:
  categories:
    output: true

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: false
      toc: true

# SEO
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Exclude
exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - node_modules
