name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
```

## 2. DNS 解析

确认你的 DNS 设置是：
```
类型：CNAME
主机：radar
值：L6891244.github.io
```

DNS 生效需要几分钟到几小时。

## 操作顺序
```
1. 在仓库里创建 .github/workflows/jekyll.yml（上面的内容）
2. git push
3. 去 Actions 页面看构建是否成功
4. 等 DNS 生效
5. 访问 radar.gcrflow.com
